name: CI

# Runs ALL package suites (root context-plane + @zam/runtime) and both builds on
# every push to main and every pull request. Closes the C9 follow-up (runtime
# health was previously untracked) and the C-status drift risk (the job summary
# emits the live test counts so README/board prose can't silently go stale).
# Canonical: docs/33 §7 (Phase 2d / D9).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: build + test (root + runtime + adapters)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # --- Root package: context-plane (core + HTTP + future-harness) ---
      - name: Install (root)
        run: npm ci

      - name: Build (core)
        run: npm run build

      - name: Test (root suite)
        run: |
          set -o pipefail
          npm test 2>&1 | tee root-test.log

      # --- Runtime package: @zam/runtime ---
      # `npm install` (not ci) re-links the workspace-local `context-plane`
      # file: dependency. Core must be built first (above) so tsc resolves its
      # types for the dynamic import. Canonical: docs/32 §11 (C3 item c).
      - name: Install (runtime)
        working-directory: packages/runtime
        run: npm install

      - name: Build (runtime)
        working-directory: packages/runtime
        run: npm run build

      - name: Test (runtime suite)
        working-directory: packages/runtime
        run: |
          set -o pipefail
          npm test 2>&1 | tee runtime-test.log

      # --- Adapter package: @zam/adapter-openclaw ---
      # `npm install` re-links the workspace-local `context-plane` file: dependency
      # (core built above) — same pattern as the runtime. Canonical: docs/38.
      - name: Install (adapter-openclaw)
        working-directory: packages/adapter-openclaw
        run: npm install

      - name: Build (adapter-openclaw)
        working-directory: packages/adapter-openclaw
        run: npm run build

      - name: Test (adapter-openclaw suite)
        working-directory: packages/adapter-openclaw
        run: |
          set -o pipefail
          npm test 2>&1 | tee adapter-test.log

      # --- Adapter package: @zam/adapter-mcp ---
      - name: Install (adapter-mcp)
        working-directory: packages/adapter-mcp
        run: npm install

      - name: Build (adapter-mcp)
        working-directory: packages/adapter-mcp
        run: npm run build

      - name: Test (adapter-mcp suite)
        working-directory: packages/adapter-mcp
        run: |
          set -o pipefail
          npm test 2>&1 | tee adapter-mcp-test.log

      # --- Status summary (D9): emit live counts to the job summary ---
      - name: Status summary
        if: always()
        run: |
          {
            echo "## ZAM test status"
            echo ""
            echo "- **Root suite:** $(grep -oE 'Tests +[0-9]+ passed \([0-9]+\)' root-test.log | tail -1 || echo 'n/a')"
            echo "- **Runtime suite:** $(grep -oE 'Tests +[0-9]+ passed \([0-9]+\)' packages/runtime/runtime-test.log | tail -1 || echo 'n/a')"
            echo "- **Adapter (openclaw):** $(grep -oE 'Tests +[0-9]+ passed \([0-9]+\)' packages/adapter-openclaw/adapter-test.log | tail -1 || echo 'n/a')"
            echo "- **Adapter (mcp):** $(grep -oE 'Tests +[0-9]+ passed \([0-9]+\)' packages/adapter-mcp/adapter-mcp-test.log | tail -1 || echo 'n/a')"
          } >> "$GITHUB_STEP_SUMMARY"
